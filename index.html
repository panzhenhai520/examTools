        function bindBoardEvents() {
            board.on('update', function() {
                updateAllAnglesRadii();
            });

            board.on('move', function(e) {
                let coords = board.getUsrCoordsOfMouse(e);
                let mouseX = coords[0], mouseY = coords[1]; 

                if (currentMode === 'pointer' && activeLabel && activeLabelParent) {
                    let dx = mouseX - labelDragStartUsr[0]; let dy = mouseY - labelDragStartUsr[1];
                    let px = dx * board.unitX; let py = -dy * board.unitY; 
                    activeLabel.setAttribute({ offset: [activeLabelStartOffset[0] + px, activeLabelStartOffset[1] + py] });
                    hasDraggedGraphic = true; board.update(); return;
                }

                if (currentMode === 'pointer') { if (board.mouse && board.mouse.obj) { hasDraggedGraphic = true; } }

                if ((currentMode === 'circle' || currentMode === 'line') && clickPoints.length === 1) {
                    let pX = mouseX, pY = mouseY;
                    let minDist = 30 / board.unitX; 
                    for (let id in board.objects) {
                        let el = board.objects[id];
                        if (['point', 'glider'].includes(el.elType) && el !== snapPreviewPoint && el !== shapePreviewPoint && el.visProp.visible && el !== clickPoints[0]) {
                            let d = Math.hypot(el.X() - mouseX, el.Y() - mouseY);
                            if (d < minDist) {
                                minDist = d; pX = el.X(); pY = el.Y();
                            }
                        }
                    }

                    if (!shapePreviewPoint) {
                        shapePreviewPoint = board.create('point', [pX, pY], {visible: false});
                        if (currentMode === 'circle') {
                            shapePreviewRadius = board.create('segment', [clickPoints[0], shapePreviewPoint], {strokeWidth: 1, dash: 2, strokeColor: '#6b7280'});
                            shapePreviewObj = board.create('circle', [clickPoints[0], shapePreviewPoint], {strokeWidth: 1, dash: 2, strokeColor: '#9ca3af', fillColor: 'none', highlight: false});
                        } else {
                            let selectedColor = document.getElementById('color-picker').value;
                            shapePreviewObj = board.create('segment', [clickPoints[0], shapePreviewPoint], {strokeWidth: 2, strokeColor: selectedColor, dash: 2, highlight: false});
                        }
                    } else {
                        shapePreviewPoint.moveTo([pX, pY]); board.update();
                    }
                }

                if (currentMode !== 'point') { 
                    if (snapPreviewPoint) {
                        snapPreviewPoint.moveTo([9999, 9999]); 
                        snapPreviewPoint.name = '吸附';
                        if (snapPreviewPoint.label) snapPreviewPoint.label.setText('吸附');
                        board.update();
                    }
                    activeSnapSegment = null; 
                    return; 
                }

                let closestSegment = null, minDistLine = 0.8, bestT = -1;
                for (let id in board.objects) {
                    let el = board.objects[id];
                    if ((el.elType === 'line' || el.elType === 'segment') && el.point1 && el.point2) {
                        let p1 = el.point1, p2 = el.point2;
                        let dx = p2.X() - p1.X(), dy = p2.Y() - p1.Y();
                        let l2 = dx*dx + dy*dy;
                        if (l2 > 0.01) { 
                            let t = ((mouseX - p1.X()) * dx + (mouseY - p1.Y()) * dy) / l2;
                            if (t >= 0.02 && t <= 0.98) {
                                let projX = p1.X() + t * dx, projY = p1.Y() + t * dy;
                                let dist = Math.hypot(mouseX - projX, mouseY - projY);
                                if (dist < minDistLine) { minDistLine = dist; closestSegment = el; bestT = t; }
                            }
                        }
                    }
                }

                if (closestSegment) {
                    activeSnapSegment = closestSegment; 
                    let p1 = closestSegment.point1, p2 = closestSegment.point2;
                    let shortRatio = Math.min(bestT, 1 - bestT);
                    let bestFraction = null, snapT = bestT; 
                    const fractions = [{t: 1/2, label: '1/2'}, {t: 1/3, label: '1/3'}, {t: 2/3, label: '1/3'}, {t: 1/4, label: '1/4'}, {t: 3/4, label: '1/4'}, {t: 1/5, label: '1/5'}, {t: 4/5, label: '1/5'}, {t: 2/5, label: '2/5'}, {t: 3/5, label: '2/5'}];
                    let snapTolerance = 0.8 / Math.hypot(p2.X() - p1.X(), p2.Y() - p1.Y()); 
                    for (let f of fractions) { if (Math.abs(bestT - f.t) < snapTolerance) { bestFraction = f; snapT = f.t; break; } }
                    
                    let displayLabel = bestFraction ? ('短/总 = ' + bestFraction.label) : ('短/总 ≈ ' + shortRatio.toFixed(2));
                    let snapX = p1.X() + snapT * (p2.X() - p1.X()), snapY = p1.Y() + snapT * (p2.Y() - p1.Y());
                    if (snapPreviewPoint) {
                        snapPreviewPoint.moveTo([snapX, snapY]);
                        snapPreviewPoint.name = displayLabel;
                        if (snapPreviewPoint.label) snapPreviewPoint.label.setText(displayLabel);
                        board.update(); 
                    }
                } else {
                    activeSnapSegment = null;
                    if (snapPreviewPoint) { 
                        snapPreviewPoint.moveTo([9999, 9999]); 
                        snapPreviewPoint.name = '吸附';
                        if (snapPreviewPoint.label) snapPreviewPoint.label.setText('吸附');
                        board.update(); 
                    }
                }
            });

            board.on('down', function(e) {
                hasDraggedGraphic = false; 
                
                if (e.button === 2) {
                    let els = board.getAllObjectsUnderMouse(e);
                    let targetTypes = ['line', 'segment', 'circle', 'angle'];
                    let target = els.find(el => targetTypes.includes(el.elType) && el.visProp.visible);
                    if (target) {
                        let currentDash = target.visProp.dash || 0; target.setAttribute({dash: currentDash === 0 ? 2 : 0});
                        board.update(); triggerSave(); 
                    }
                    return; 
                }

                if (currentMode === 'pointer') {
                    let els = board.getAllObjectsUnderMouse(e);
                    let targetNode = e.target || e.srcElement; let textEl = null;

                    for (let i = 0; i < els.length; i++) {
                        let el = els[i]; let cssStr = (el.visProp.cssclass || el.visProp.cssClass || '');
                        if (el.elType === 'text' && !cssStr.includes('static-text') && !cssStr.includes('snap-label')) {
                            if (el.rendNode && el.rendNode.contains(targetNode)) { textEl = el; break; }
                        }
                    }
                    
                    if (textEl) {
                        let parent = Object.values(board.objects).find(obj => obj.label === textEl || obj.customTextObj === textEl);
                        if (!parent && textEl.parent) parent = textEl.parent; 
                        if (parent) {
                            activeLabel = textEl; activeLabelParent = parent;
                            labelDragStartUsr = board.getUsrCoordsOfMouse(e); activeLabelStartOffset = [...activeLabel.visProp.offset];
                            parent.setAttribute({fixed: true}); if (board.mouse) board.mouse.obj = null;
                            board.dehighlightAll(); return; 
                        }
                    }
                    return; 
                }

                if (e.button !== 0 || currentMode === 'pan') return;
                
                let coords = board.getUsrCoordsOfMouse(e);
                let actualClickCoords = [coords[0], coords[1]];
                let els = board.getAllObjectsUnderMouse(e);
                
                let isPointUnderMouse = false, clickedPoint = null;
                for (let i = 0; i < els.length; i++) {
                    if (['point', 'glider'].includes(els[i].elType) && els[i] !== snapPreviewPoint && els[i] !== shapePreviewPoint && els[i].visProp.visible) {
                        isPointUnderMouse = true; clickedPoint = els[i]; break;
                    }
                }
                if (!isPointUnderMouse) {
                    let minDist = 30 / board.unitX; 
                    for (let id in board.objects) {
                        let el = board.objects[id];
                        if (['point', 'glider'].includes(el.elType) && el !== snapPreviewPoint && el !== shapePreviewPoint && el.visProp.visible) {
                            let d = Math.hypot(el.X() - actualClickCoords[0], el.Y() - actualClickCoords[1]);
                            if (d < minDist) {
                                minDist = d;
                                isPointUnderMouse = true;
                                clickedPoint = el;
                            }
                        }
                    }
                }

                let promptModal = document.getElementById('prompt-modal');
                if (!promptModal.classList.contains('hidden')) {
                    // 【终极解绑劫持：彻底删除盲抓旧角代码，全系采用精准射线寻角面板】
                    let potentialVertex = clickedPoint;
                    if (!potentialVertex) {
                        let bestDist = Infinity;
                        for(let id in board.objects) {
                            let el = board.objects[id];
                            if (['point', 'glider'].includes(el.elType) && el.visProp.visible && el !== snapPreviewPoint && el !== shapePreviewPoint) {
                                let d = Math.hypot(el.X() - actualClickCoords[0], el.Y() - actualClickCoords[1]);
                                if (d < bestDist && d < 8.0) { // 宽阔的顶点捕捉半径
                                    bestDist = d; potentialVertex = el; 
                                }
                            }
                        }
                    }
                    
                    if (potentialVertex) {
                        let pairs = getAllAnglesFromVertex(potentialVertex, actualClickCoords);
                        if (pairs && pairs.length > 0) {
                            pairs.forEach(p => p.existingAngle = findExistingAngle(potentialVertex, p.p1, p.p2));
                            openUnifiedAnglePanel(potentialVertex, pairs, true); // true表示公式模式，会显示“选择并插入”
                            return; 
                        }
                    }
                    
                    let target = els.find(el => ['segment', 'line'].includes(el.elType)) || els.find(el => ['point', 'glider'].includes(el.elType));
                    if (!target && els[0] && els[0].elType !== 'text') target = els[0];
                    if (target) {
                        let insertStr = '';
                        if (target.elType === 'line' || target.elType === 'segment') insertStr = (target.point1 ? getPtName(target.point1) : '') + (target.point2 ? getPtName(target.point2) : '');
                        else if (['point', 'glider'].includes(target.elType)) insertStr = getPtName(target);
                        if (insertStr) { document.getElementById('latex-input').value += insertStr; document.getElementById('latex-input').focus(); return; }
                    }
                    pendingTextCoords = actualClickCoords;
                    return; 
                }

                if (currentMode === 'markAngle') {
                    let v = clickedPoint;
                    if (!v) {
                        let bestDist = Infinity;
                        for(let id in board.objects) {
                            let el = board.objects[id];
                            if (['point', 'glider'].includes(el.elType) && el.visProp.visible && el !== snapPreviewPoint && el !== shapePreviewPoint) {
                                let d = Math.hypot(el.X() - actualClickCoords[0], el.Y() - actualClickCoords[1]);
                                if (d < bestDist && d < 8.0) { 
                                    bestDist = d; v = el; 
                                }
                            }
                        }
                    }
                    
                    if (v) {
                        let pairs = getAllAnglesFromVertex(v, actualClickCoords);
                        if (pairs && pairs.length > 0) {
                            pairs.forEach(p => p.existingAngle = findExistingAngle(v, p.p1, p.p2));
                            openUnifiedAnglePanel(v, pairs, false); 
                        }
                    }
                    return; 
                }

                if (currentMode === 'color') {
                    if (els.length > 0) {
                        let selectedColor = document.getElementById('color-picker').value;
                        
                        let target = els.find(el => ['segment', 'line'].includes(el.elType)) || 
                                     els.find(el => el.elType === 'circle') || 
                                     els.find(el => el.elType === 'angle');
                        
                        if (target) {
                            target.setAttribute({strokeColor: selectedColor});
                            if (target.hasPoint || target.elType === 'angle' || target.elType === 'circle') target.setAttribute({fillColor: selectedColor, fillOpacity: 0.3});
                            board.update();
                            triggerSave(); 
                            return;
                        }
                        
                        let candidates = findPolygonRegions(actualClickCoords);
                        if (candidates.length > 0) {
                            openUnifiedRegionPanel(candidates, selectedColor);
                            return;
                        }
                        
                        target = els.find(el => !['point', 'glider'].includes(el.elType)) || els[0];
                        if (target) {
                            target.setAttribute({strokeColor: selectedColor});
                            if (target.elType === 'polygon') {
                                target.setAttribute({fillColor: selectedColor, fillOpacity: 0.2});
                            } else if (target.hasPoint || target.elType === 'angle' || target.elType === 'circle') {
                                target.setAttribute({fillColor: selectedColor, fillOpacity: 0.3});
                            }
                            board.update();
                            triggerSave(); 
                        }
                    }
                    return; 
                }
                else if (currentMode === 'eraser') {
                    if (els.length > 0) {
                        const targetTypes = ['point', 'glider', 'line', 'segment', 'circle', 'polygon', 'angle', 'text', 'midpoint'];
                        let validTargets = els.filter(el => targetTypes.includes(el.elType) && el !== snapPreviewPoint && el !== shapePreviewPoint && el.visProp.visible && !(el.id.includes('ticks') || el.id.includes('Axes')));
                        if (validTargets.length === 1) {
                            board.removeObject(validTargets[0]); board.update();
                            triggerSave(); 
                        } else if (validTargets.length > 1) {
                            let items = validTargets.map(el => {
                                let desc = '未知元素';
                                if (['point', 'glider'].includes(el.elType)) desc = '点 ' + getPtName(el);
                                else if (el.elType === 'segment') desc = '线段';
                                else if (el.elType === 'line') desc = '直线';
                                else if (el.elType === 'polygon') desc = '多边形';
                                else if (el.elType === 'angle') desc = '角 ' + (el.customLabel || '');
                                else if (el.elType === 'circle') desc = '圆';
                                else if (el.elType === 'text') desc = '文本/公式';
                                return { id: el.id, desc: desc, obj: el };
                            });
                            let uniqueItems = [], seen = new Set();
                            items.forEach(item => { if (!seen.has(item.id)) { seen.add(item.id); uniqueItems.push(item); } });
                            if (uniqueItems.length === 1) { board.removeObject(uniqueItems[0].obj); board.update(); triggerSave(); } 
                            else if (uniqueItems.length > 1) { openEraserModal(uniqueItems); }
                        }
                    }
                    return;
                }
                else if (currentMode === 'point') {
                    let isPointUnderMouse = els.some(el => ['point', 'glider'].includes(el.elType) && el !== snapPreviewPoint && el !== shapePreviewPoint && el.visProp.visible);
                    if (!isPointUnderMouse) {
                        let finalCoords = (snapPreviewPoint && snapPreviewPoint.X() !== 9999) ? [snapPreviewPoint.X(), snapPreviewPoint.Y()] : actualClickCoords;
                        let currentSlideObj = activeSnapSegment; 
                        
                        openGenericModal("命名控制点", "请输入点的字母", String.fromCharCode(pointCharCode), function(val) {
                            let nameToUse = val.trim().toUpperCase(); updatePointCharCode(nameToUse);
                            let props = { size: 4, name: nameToUse, fillColor: '#ef4444', strokeColor: 'white', visible: isPointsVisible, withLabel: nameToUse !== '', label: { offset: [15, 15] } };
                            
                            if (currentSlideObj) { 
                                board.create('glider', [finalCoords[0], finalCoords[1], currentSlideObj], props);
                            } else {
                                board.create('point', finalCoords, props);
                            }
                            
                            if (snapPreviewPoint) { 
                                snapPreviewPoint.moveTo([9999, 9999]); 
                                snapPreviewPoint.name = '吸附';
                                if (snapPreviewPoint.label) snapPreviewPoint.label.setText('吸附');
                                board.update(); 
                            }
                            activeSnapSegment = null;
                            triggerSave(); 
                            return true;
                        });
                    }
                } 
                else if (currentMode === 'text') {
                    pendingTextCoords = actualClickCoords;
                    document.getElementById('prompt-modal').classList.remove('hidden');
                    let inputField = document.getElementById('latex-input'); inputField.value = ''; 
                    setTimeout(() => { inputField.focus(); }, 50); 
                }
                else {
                    let p;
                    let isPointUnderMouse = false, clickedPoint = null;
                    for (let i = 0; i < els.length; i++) {
                        if (['point', 'glider'].includes(els[i].elType) && els[i] !== snapPreviewPoint && els[i] !== shapePreviewPoint && els[i].visProp.visible) {
                            isPointUnderMouse = true; clickedPoint = els[i]; break;
                        }
                    }
                    
                    if (isPointUnderMouse) {
                        p = clickedPoint; 
                        if (currentMode === 'polygon' && clickPoints.length >= 2 && p === clickPoints[0]) {
                            let selectedColor = document.getElementById('color-picker').value;
                            board.create('polygon', clickPoints, {
                                fillColor: 'none', fillOpacity: 0, hasInnerPoints: true, highlightFillColor: 'none', highlightFillOpacity: 0, borders: { strokeColor: selectedColor, strokeWidth: 2, fixed: true }
                            });
                            tempLines.forEach(line => board.removeObject(line)); tempLines = []; clickPoints = [];
                            triggerSave(); 
                            return; 
                        }
                    } else {
                        let isCircleCenter = (currentMode === 'circle' && clickPoints.length === 0);
                        let autoName = getNextAutoPointName(isCircleCenter);
                        let props = { size: 3, name: autoName, fillColor: '#3b82f6', visible: isPointsVisible, withLabel: true, label: { offset: [15, 15] } };
                        let finalCoords = (shapePreviewPoint && shapePreviewPoint.X() !== 9999) ? [shapePreviewPoint.X(), shapePreviewPoint.Y()] : actualClickCoords;
                        
                        if (activeSnapSegment) {
                            p = board.create('glider', [finalCoords[0], finalCoords[1], activeSnapSegment], props);
                        } else {
                            p = board.create('point', finalCoords, props);
                        }
                        if(currentMode !== 'circle' && currentMode !== 'line' && currentMode !== 'polygon') triggerSave();
                    }
                    clickPoints.push(p);

                    if (currentMode === 'polygon' && clickPoints.length > 1) {
                        let tempLine = board.create('segment', [clickPoints[clickPoints.length - 2], p], { strokeColor: '#9ca3af', strokeWidth: 1, dash: 2 });
                        tempLines.push(tempLine);
                    }

                    if (currentMode === 'line' && clickPoints.length === 2) {
                        let selectedColor = document.getElementById('color-picker').value;
                        if (shapePreviewObj) { board.removeObject(shapePreviewObj); board.removeObject(shapePreviewPoint); shapePreviewObj = null; shapePreviewPoint = null; }
                        
                        board.create('segment', [clickPoints[0], clickPoints[1]], { strokeWidth: 2, strokeColor: selectedColor });
                        clickPoints = [];
                        triggerSave(); 
                    }
                    else if (currentMode === 'circle' && clickPoints.length === 2) {
                        let selectedColor = document.getElementById('color-picker').value;
                        if (shapePreviewObj) { board.removeObject(shapePreviewObj); board.removeObject(shapePreviewPoint); board.removeObject(shapePreviewRadius); shapePreviewObj = null; shapePreviewPoint = null; shapePreviewRadius = null; }
                        board.create('circle', [clickPoints[0], clickPoints[1]], { strokeWidth: 2, strokeColor: selectedColor, fillColor: selectedColor, fillOpacity: 0.1 });
                        clickPoints = [];
                        triggerSave(); 
                    }
                }
            });
            
            board.on('up', function(e) {
                if (activeLabelParent) {
                    activeLabelParent.setAttribute({fixed: false});
                    activeLabel = null; activeLabelParent = null;
                    hasDraggedGraphic = true; 
                }
                if (currentMode === 'pointer' && hasDraggedGraphic) {
                    triggerSave();
                }
                hasDraggedGraphic = false; 
            });
        }

        // ================= 【各种外围操作对接】 =================
        function openSettingsModal() {
            document.getElementById('setting-tick').value = globalBoardSettings.tickDistance;
            document.getElementById('setting-xmin').value = globalBoardSettings.bbox[0];
            document.getElementById('setting-ymax').value = globalBoardSettings.bbox[1];
            document.getElementById('setting-xmax').value = globalBoardSettings.bbox[2];
            document.getElementById('setting-ymin').value = globalBoardSettings.bbox[3];
            document.getElementById('settings-modal').classList.remove('hidden');
        }

        function closeSettingsModal() { document.getElementById('settings-modal').classList.add('hidden'); }

        function applySettings() {
            globalBoardSettings.tickDistance = parseFloat(document.getElementById('setting-tick').value) || 1;
            globalBoardSettings.bbox[0] = parseFloat(document.getElementById('setting-xmin').value) || -10;
            globalBoardSettings.bbox[1] = parseFloat(document.getElementById('setting-ymax').value) || 8;
            globalBoardSettings.bbox[2] = parseFloat(document.getElementById('setting-xmax').value) || 10;
            globalBoardSettings.bbox[3] = parseFloat(document.getElementById('setting-ymin').value) || -8;

            board.setBoundingBox(globalBoardSettings.bbox, true); 
            if (board.defaultAxes) {
                if (board.defaultAxes.x && board.defaultAxes.x.ticks && board.defaultAxes.x.ticks[0]) board.defaultAxes.x.ticks[0].setAttribute({ticksDistance: globalBoardSettings.tickDistance, insertTicks: false});
                if (board.defaultAxes.y && board.defaultAxes.y.ticks && board.defaultAxes.y.ticks[0]) board.defaultAxes.y.ticks[0].setAttribute({ticksDistance: globalBoardSettings.tickDistance, insertTicks: false});
            }
            board.update();
            closeSettingsModal();
            triggerSave(); 
        }

        function requestClearBoard() { document.getElementById('confirm-modal').classList.remove('hidden'); }
        function closeConfirmModal() { document.getElementById('confirm-modal').classList.add('hidden'); }

        function executeClearBoard() {
            closeConfirmModal();
            JXG.JSXGraph.freeBoard(board); document.getElementById('jxgbox').innerHTML = '';
            clickPoints = []; tempLines = []; shapePreviewObj = null; shapePreviewPoint = null; shapePreviewRadius = null;
            snapPreviewPoint = null; activeSnapSegment = null;
            angleColorIdx = 1; pointCharCode = 68; 
            isAxesVisible = true; isPointsVisible = true; isAnglesVisible = true;
            document.getElementById('btn-toggle-axes').innerText = '👁️ 坐标';
            document.getElementById('btn-toggle-points').innerText = '👁️ 隐藏点';
            document.getElementById('btn-toggle-angles').innerText = '👁️ 隐藏角';
            setMode('pointer');
            
            initBoardCore(); recreatePreviewSystem(); bindBoardEvents();
            
            historyStack = []; historyIndex = -1;
            setTimeout(() => { executeSaveHistory(); }, 200);
        }

        function closePromptModal() {
            document.getElementById('prompt-modal').classList.add('hidden');
            pendingTextCoords = null; setMode('pointer');
        }

        function executeAddText() {
            let latex = document.getElementById('latex-input').value;
            if (latex && pendingTextCoords) {
                board.create('text', [pendingTextCoords[0], pendingTextCoords[1], '$' + latex + '$'], {
                    fontSize: 18, useMathJax: true, needsRegularUpdate: false, fixed: false, cssClass: 'draggable-text' 
                });
                triggerSave(); 
            }
            closePromptModal(); setMode('pointer');
        }

        function openGenericModal(title, desc, defaultVal, callback) {
            document.getElementById('generic-modal-title').innerText = title;
            document.getElementById('generic-modal-desc').innerText = desc;
            let errorEl = document.getElementById('generic-modal-error'); errorEl.classList.add('hidden'); errorEl.innerText = '';
            let inputEl = document.getElementById('generic-input'); inputEl.value = defaultVal;
            genericModalCallback = callback;
            document.getElementById('generic-modal').classList.remove('hidden');
            setTimeout(() => { inputEl.focus(); inputEl.select(); }, 50);
        }

        function closeGenericModal() {
            document.getElementById('generic-modal').classList.add('hidden'); genericModalCallback = null;
            if (!document.getElementById('prompt-modal').classList.contains('hidden')) document.getElementById('latex-input').focus();
        }

        function submitGenericModal() {
            let val = document.getElementById('generic-input').value.trim();
            if (genericModalCallback) { let isValid = genericModalCallback(val); if (isValid === false) return; }
            closeGenericModal();
        }

        function openEraserModal(items) {
            let listEl = document.getElementById('eraser-list'); listEl.innerHTML = '';
            items.forEach((item) => {
                let btn = document.createElement('button');
                btn.className = "w-full text-left px-3 py-2 bg-gray-50 hover:bg-red-50 hover:text-red-600 border border-gray-200 rounded text-sm transition-colors";
                btn.innerText = `擦除: ${item.desc}`;
                btn.onclick = () => { board.removeObject(item.obj); board.update(); closeEraserModal(); triggerSave(); }; 
                listEl.appendChild(btn);
            });
            document.getElementById('eraser-modal').classList.remove('hidden');
        }

        function closeEraserModal() { document.getElementById('eraser-modal').classList.add('hidden'); }

        function drawInitialShapes() {
            const pA = board.create('point', [0, 5], { name: 'A', size: 5, color: '#dc2626', label: { offset: [10, 15] } });
            const pB = board.create('point', [-4, -2], { name: 'B', size: 5, color: '#dc2626', label: { offset: [-20, -15] } });
            const pC = board.create('point', [4, -2], { name: 'C', size: 5, color: '#dc2626', label: { offset: [15, -15] } });

            board.create('polygon', [pA, pB, pC], { fillColor: 'none', fillOpacity: 0, hasInnerPoints: true, highlight: false, borders: { strokeColor: '#b91c1c', strokeWidth: 2, fixed: true, highlight: false } });

            const angleA = board.create('angle', [pB, pA, pC], {
                name: '', withLabel: false, radius: 0.5, fillColor: '#ef4444', strokeColor: '#dc2626', highlight: false
            });
            angleA.customLabel = 'A'; angleA.vertexPoint = pA;
            angleA.originalP1 = pB;
            angleA.originalP2 = pC;
            angleA.displayName = '';
            angleA.showLabel = false;
            angleA.currentDynamicRadius = 0.5;
            bindAngleText(angleA);
        }

        function setMode(mode) {
            currentMode = mode;
            clickPoints = []; 
            if (tempLines.length > 0) { tempLines.forEach(l => board.removeObject(l)); tempLines = []; }
            if (shapePreviewObj) {
                board.removeObject(shapePreviewObj); board.removeObject(shapePreviewPoint); 
                if (shapePreviewRadius) board.removeObject(shapePreviewRadius);
                shapePreviewObj = null; shapePreviewPoint = null; shapePreviewRadius = null;
            }
            if (mode !== 'point' && snapPreviewPoint) { 
                snapPreviewPoint.moveTo([9999, 9999]); 
                snapPreviewPoint.name = '吸附';
                if (snapPreviewPoint.label) snapPreviewPoint.label.setText('吸附');
                activeSnapPoint = null; activeSnapSegment = null; 
            }

            if (board && board.attr && board.attr.pan) { board.attr.pan.enabled = (mode === 'pan'); }

            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'shadow-sm', 'text-blue-600'); btn.classList.add('text-gray-600');
            });
            const activeBtn = document.getElementById('btn-' + mode);
            if (activeBtn) {
                activeBtn.classList.remove('text-gray-600'); activeBtn.classList.add('bg-white', 'shadow-sm', 'text-blue-600');
            }

            let jxgbox = document.getElementById('jxgbox');
            jxgbox.classList.remove('cursor-eraser', 'cursor-angle', 'cursor-default-cross', 'cursor-pointer-mode', 'cursor-pan');
            if (mode === 'eraser') jxgbox.classList.add('cursor-eraser');
            else if (mode === 'markAngle') jxgbox.classList.add('cursor-angle');
            else if (mode === 'pointer') jxgbox.classList.add('cursor-pointer-mode');
            else if (mode === 'pan') jxgbox.classList.add('cursor-pan');
            else jxgbox.classList.add('cursor-default-cross');

            const statusBar = document.getElementById('status-bar');
            const messages = {
                'pointer': '当前模式：选择。拖拽图形内部可平移，拖拽顶点变形，拖拽字母可单独调整文字位置。',
                'pan': '当前模式：漫游。在画布空白处按住鼠标左键即可随意移动视角。所有模式均支持滚轮缩放。',
                'point': '当前模式：加点。靠近线段自动吸附绑定，支持连按回车按字母顺序自动递增。',
                'line': '当前模式：连线。连续点击两个位置以绘制一条线段。',
                'circle': '当前模式：画圆。点击确定圆心(默认O)，拖动鼠标出现虚线预览，再次点击确定半径。',
                'polygon': '当前模式：多边形。依次点击各个顶点，最后回到起点点击以闭合多边形。',
                'markAngle': '当前模式：标角。点击角内部，自动出全能面板（包含修改与多角选择）。',
                'text': '当前模式：公式。点击线段/顶点自动录入名称；点击【角区域】自动弹出选角面板供你精准拾取！',
                'color': '当前模式：改色。选定颜色后，点击任意“线条”上色，或点击“子三角形”的空白面进行填充！',
                'eraser': '当前模式：擦除。点击画板上的任意元素将其删除。重叠时将弹窗询问。'
            };
            statusBar.innerText = messages[mode];
        }

        function toggleAxes() {
            isAxesVisible = !isAxesVisible;
            toggleAxesSilent(isAxesVisible);
            board.update();
            document.getElementById('btn-toggle-axes').innerText = isAxesVisible ? '👁️ 隐藏坐标' : '🙈 显示坐标';
            triggerSave(); 
        }

        function togglePoints() {
            isPointsVisible = !isPointsVisible;
            for (let id in board.objects) {
                let el = board.objects[id];
                if (['point', 'glider'].includes(el.elType) && el !== snapPreviewPoint && el !== shapePreviewPoint) el.setAttribute({visible: isPointsVisible});
            }
            board.update();
            document.getElementById('btn-toggle-points').innerText = isPointsVisible ? '👁️ 隐藏点' : '🙈 显示点';
            if (currentMode === 'point') setMode('point');
            triggerSave(); 
        }

        function toggleAngles() {
            isAnglesVisible = !isAnglesVisible;
            for (let id in board.objects) {
                let el = board.objects[id];
                if (el.elType === 'angle') el.setAttribute({visible: isAnglesVisible});
            }
            board.update();
            document.getElementById('btn-toggle-angles').innerText = isAnglesVisible ? '👁️ 隐藏角' : '🙈 显示角';
            triggerSave(); 
        }

        function changeBgColor(color) {
            document.getElementById('jxgbox').style.backgroundColor = color;
        }

    </script>
</body>
